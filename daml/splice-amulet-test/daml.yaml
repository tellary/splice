# NOTE : There are SBT jobs that will compile this project into a dar under
# the usual .daml/dist output directory and run code-gen to create scala case
# classes. You should either use `daml build` or `sbt ~compile`, but NOT both
# at the same time (see #179 for more context).

sdk-version: 3.4.11
name: splice-amulet-test
source: daml
version: 0.1.25
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
data-dependencies:
  - ../splice-util/.daml/dist/splice-util-current.dar
  - ../splice-amulet/.daml/dist/splice-amulet-current.dar

  - ../dars/splice-api-featured-app-v1-1.0.0.dar
  - ../splice-api-reward-assignment-v1/.daml/dist/splice-api-reward-assignment-v1-current.dar
  - ../dars/splice-api-token-metadata-v1-1.0.0.dar
  - ../dars/splice-api-token-holding-v1-1.0.0.dar
  - ../dars/splice-api-token-allocation-instruction-v1-1.0.0.dar
  - ../dars/splice-api-token-transfer-instruction-v1-1.0.0.dar
  - ../dars/splice-api-token-allocation-v1-1.0.0.dar

  - ../../token-standard/splice-api-token-transfer-events-v2/.daml/dist/splice-api-token-transfer-events-v2-current.dar
  - ../../token-standard/splice-api-token-holding-v2/.daml/dist/splice-api-token-holding-v2-current.dar
  - ../../token-standard/splice-api-token-transfer-instruction-v2/.daml/dist/splice-api-token-transfer-instruction-v2-current.dar
  - ../../token-standard/splice-api-token-allocation-v2/.daml/dist/splice-api-token-allocation-v2-current.dar
  - ../../token-standard/splice-api-token-allocation-instruction-v2/.daml/dist/splice-api-token-allocation-instruction-v2-current.dar
  - ../../token-standard/splice-api-token-allocation-request-v2/.daml/dist/splice-api-token-allocation-request-v2-current.dar

  - ../../token-standard/splice-token-standard-utils/.daml/dist/splice-token-standard-utils-current.dar
  - ../../token-standard/splice-token-standard-v1-test/.daml/dist/splice-token-standard-v1-test-current.dar
  - ../../token-standard/splice-token-standard-v2-test/.daml/dist/splice-token-standard-v2-test-current.dar
build-options:
  - --ghc-option=-Wunused-binds
  - --ghc-option=-Wunused-matches
  - -Wno-template-interface-depends-on-daml-script
  - -Wno-deprecated-exceptions
  - --target=2.1
