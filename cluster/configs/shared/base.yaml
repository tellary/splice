# Reference configuration options
cluster:
  nodePools:
    apps:
      minNodes: 0
      # A high max-nodes by default to support large deployments and hard migrations
      # Should be set to a lower number (currently 8) on CI clusters that do neither of those.
      maxNodes: 20
      nodeType: n4d-standard-16
    infra:
      minNodes: 1
      maxNodes: 3
      nodeType: n4d-standard-8
infra:
  prometheus:
    retentionDuration: "1y"
    retentionSize: "1500GB"
    storageSize: "2Ti"
  gkeGateway:
    # swapping this comes with ~5min of downtime
    # when changing true->false, pulumi gets delete order wrong; try
    #   cncluster pulumi infra up --target urn:pulumi:infra.$GCP_CLUSTER_BASENAME::infra::kubernetes:gateway.networking.k8s.io/v1:Gateway::cn-gke-l7-gateway --target-dependents
    # before normal update
    proxyForIstioHttp: false
  istio:
    enableIngressAccessLogging: true
    enablePublicTokenRegistry: true
    sequencerFlowControl:
      # See https://github.com/DACH-NY/canton-network-internal/issues/4901
      # The values are somewhat arbitrary so more fine tuning may be appropriate.
      initialStreamWindowSize: 524288        # 512 KiB max per stream
      initialConnectionWindowSize: 52428800  # 50 MiB max per connection
# configs specific for the pulumi project
# will be applied to all the stacks in the project
pulumiProjectConfig:
  default:
    # skip helm installs and create only non helm resources.
    # this for example lets you create the cloud sql instances without having deployments using them, and restoring them from other sources
    installDataOnly: false
    isExternalCluster: false
    hasPublicInfo: false
    # For long running production clusters this flag can be set to false to remove pulumi dependencies between our apps.
    # This allows for much faster updates going all at once
    # We don't want this enabled for the initial deployments in ciclusters as the logs would become a lot noisier
    interAppsDependencies: true
    cloudSql:
      enabled: false
      protected: true
      # default tier is equivalent to "Standard" machine with 2 vCpus and 7.5GB RAM
      tier: 'db-custom-2-7680'
      # enable enterprise plus for better performance and faster maintenance
      enterprisePlus: false
      flags:
        random_page_cost: '1.1'
        temp_file_limit: '2147483647'
        max_wal_size: '20480' # 20GB, but GCP doesn't allow to write it that way and must be a number indicating MB
        maintenance_work_mem: '2000000' # 2Gi, but GCP doesn't allow to write it that way and must be a number indicating KB,
        work_mem: '16384' # 16MB, raised from the default of 4MB to better support large queries, but still low enough to avoid OOMs in case of many concurrent queries, can be increased for instances with high memory
    skipSynchronizerInitialization: true
    # default not allowing version downgrades in our apps
    allowDowngrade: true
  sv-runbook:
    cloudSql:
      enabled: false
pulumiStacks:
  default:
    parallelism: 64
    resources:
      requests:
        memory: '2Gi'
  canton-network:
    resources:
      requests:
        memory: '4Gi'
  multi-validator:
    parallelism: 10
    resources:
      requests:
        memory: '6Gi'
validator1:
  logging:
    level: DEBUG
  participant:
    additionalEnvVars:
      - !include(./participant_pruning.yaml)
splitwell:
  participant:
    additionalEnvVars:
      - !include(./participant_pruning.yaml)
# initial round used only on fresh initialization or resets
# first SV bootstraps the network with it, other SVs learn it via their sponsors
initialRound: 0
## in the form <pulumi-project>:
##                <settings>
## ex:
#  canton-network:
#    installDataOnly: true
monitoring:
  enableGrafanaServiceAccountToken: false
  alerting:
    enableNoDataAlerts: false
    alerts:
      pruning:
        participantRetentionDays: 30
        sequencerRetentionDays: 30
        mediatorRetentionDays: 30
      ingestion:
        thresholdEntriesPerBatch: 80
      delegatelessContention:
        thresholdPerNamespace: 0.20
      delegatelessNonLocalContention:
        thresholdPerNamespace: 0.05
      trafficWaste:
        kilobytes: 1
        overMinutes: 5
        quantile: 0.95
      # confirmation requests correspond to new ledger submissions;
      # we alert if the rate is higher than expected to spot potential overload situations
      confirmationRequests:
        total:
          rate: 25
          overMinutes: 5
      dsoMissedConfirmations:
        threshold: 0.01
        windowMinutes: 10
      cloudSql:
        maintenance: false
      cometbft:
        expectedMaxBlocksPerSecond: 3.5
      loadTester:
        minRate: 0.95
      mediators:
        acknowledgementLagSeconds: 900
      deployment:
        pendingPeriodMinutes: 5
      sequencerClientDelay:
        seconds: 90
      acsCommitments:
        checkpointDelay:
          # Usually every 30s but while the commitment every 30min gets computed
          # it gets blocked so we allow up to 20min
          seconds: 1200
        completedDelay:
          # Usually every 30min, we allow up to 1h to avoid false positives.
          seconds: 3600
        computeDuration:
          # p99 of the ACS commitment computation time; alert if it exceeds 20min.
          seconds: 1200
      acsSnapshots:
        # This task repeats every ~3h
        saveLatencyThresholdSeconds: 5400
        # This task repeats every ~30sec
        updateLatencyThresholdSeconds: 3
      sequencerRateLimits:
        rejectionRateThreshold: 0
        circuitBreakerStateThreshold: 0.5
      cantonBft:
        # Alert if the number of ingress requests queued in the BFT ordering layer
        # exceeds this threshold, which may indicate issues with the ordering layer
        mempoolMaxSizeThreshold: 100
      scanConnectionDisagreement:
        alertThreshold: 0.1
        excludedRequests:
          - "getTransferInstructionAcceptContext" # exclude as it's really sensitive to ingestion and ROP delays
          - "getOpenAndIssuingMiningRounds" # exclude as it depends on (fast) mutable state and depends on the ROP delays
        excludedConnections: []
        excludedHttpStatusCodes: ["404"]
      walletSweep:
        # Multiplier applied to a wallet sweep's configured maxBalance to set the alert threshold.
        # 1.5 means the alert fires if the balance is 50% higher than expected.
        tolerance: 1.5
      gcpQuotas:
        # Quota metric names to exclude from all GCP quota alerts.
        # Each entry is matched exactly for quota exceeded.
        # Prefer `excludedApproachingMetrics` to ignore only the >90% alerts.
        excludedMetrics:
          - cloudkms.googleapis.com/read_requests
          - cloudkms.googleapis.com/write_requests
          - cloudkms.googleapis.com/crypto_requests
          - cloudkms.googleapis.com/hsm_symmetric_requests
          - cloudkms.googleapis.com/hsm_asymmetric_requests
          - cloudkms.googleapis.com/hsm_generate_random_requests
          - cloudkms.googleapis.com/external_kms_requests
        # Quota metric names to exclude only from the "approaching limit" (>90%) alerts.
        # These metrics will still trigger the "quota exceeded" alert.
        # GCP is more forgiving of larger sets in this value.
        excludedApproachingMetrics: [ ]
        # Smoothing window for quota usage checks. Used as the avg_over_time
        # range in PromQL queries and as the alignmentPeriod for the exceeded
        # threshold alert.
        rollingWindowSeconds: 600
        # How long the condition must be continuously true before firing.
        # Should typically be >= rollingWindowSeconds to avoid retesting "old"
        # data.
        retestWindowSeconds: 600
      trafficBasedRewards:
        # Alert if we have more than this many featured app rights,
        # as too many rights may cause performance problems in computing app activity records.
        featuredAppRightsLimit: 10000
        # Alert if the average batch size of verdict ingestion exceeds this threshold,
        # as this may indicate that ingestion can't keep up.
        verdictIngestionBatchSizeThreshold: 40
        # Only alert after the average batch size of verdict ingestion exceeds the threshold for this many minutes
        verdictIngestionBatchSizePendingPeriodMinutes: 60
    # Alert on secrets appearing in logs (JWTs, Bearer tokens, passwords, etc.)
    # Key=value secrets (excluding masked values)
    # JWTs identified by base64 header prefix "eyJhbGc" (decodes to '{"alg')
    loggedSecretsFilter: |
      (
        (
          jsonPayload.message=~"(?i)(secret|token|(private|secret)(-)?key|password)=[^, ]+" AND
          -jsonPayload.message=~"(?i)(secret|token|(private|secret)(-)?key|password)=(\"\*\*\*\*\"|hidden)"
        ) OR
        jsonPayload.message=~"eyJhbGc[A-Za-z0-9_-]{2,}\.[A-Za-z0-9_-]{2,}\.[A-Za-z0-9_-]{2,}" OR
        jsonPayload.message=~"Bearer\s+eyJ[A-Za-z0-9_-]{2,}"
      )
    muteTimeIntervals: [ ]
cloudArmor:
  enabled: false
  allRulesPreviewOnly: true
  publicEndpoints:
    publicScan:
      hostname: scan.sv-2.scratcha.global.canton.network.digitalasset.com
      pathPrefix: /api/scan
      throttleAcrossAllEndpointsAllIps:
        withinIntervalSeconds: 60
        maxRequestsBeforeHttp429: 0    # Keeps scan completely closed to the public
    tokenRegistry:
      pathPrefix: /registry
      throttleAcrossAllEndpointsAllIps:
        withinIntervalSeconds: 60
        maxRequestsBeforeHttp429: 200
multiValidator:
  postgresPvcSize: '100Gi'
  resources:
    participant:
      requests:
        cpu: '1'
        memory: '8Gi'
      limits:
        memory: '16Gi'
    validator:
      requests:
        cpu: '0.5'
        memory: '2400Mi'
      limits:
        memory: '8Gi'
    postgres:
      requests:
        memory: '5Gi'
      limits:
        memory: '12Gi'
sv:
  scan:
    externalRateLimits:
      !include(./rate-limits/v0-acs.yaml;./rate-limits/unlimited.yaml;./rate-limits/public-banned.yaml;./rate-limits/token-registry.yaml)
      globalLimits:
        maxTokens: 2147483647
        tokensPerFill: 2147483647
        fillInterval: 60s
validators:
  validator-runbook:
    namespace: validator
    nodeIdentifier: 'validator-runbook'
    partyHint: 'digitalasset-testValidator-1'
    onboardingSecret: 'validatorsecret'
