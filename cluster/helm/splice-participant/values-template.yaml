imageRepo: "ghcr.io/digital-asset/decentralized-canton-sync/docker"
imageName: "canton-participant"
enableHealthProbes: true

# Custom annotations and labels for deployed resources
pod:
  annotations: {}
  labels: {}

defaultJvmOptions: -XX:+UseG1GC -XX:+UseStringDeduplication -XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=75 -Dscala.concurrent.context.numThreads=12 -XX:ActiveProcessorCount=12 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/persistent-data/heap-dump-CURRENT_DATE.hprof
resources:
  limits:
    memory: 32Gi
  requests:
    cpu: "2"
    memory: 16Gi

participantAdminUserNameFrom:
  secretKeyRef:
    key: ledger-api-user
    name: splice-app-sv-ledger-api-auth
    optional: false

metrics:
  enable: false
  release: prometheus-grafana-monitoring
  interval: 30s

persistence:
  secretName: "postgres-secrets"
  port: 5432
  enablePgInitContainer: true
  initImageName: "postgres:14"
  # When true, the pg-init container refuses to create the participant database if another
  # database named 'participant' or starting with 'participant' already exists. This guards
  # against misconfiguration on a non-fresh deployment.
  enableParticipantDbConflictCheck: true
#  secretOverrides:
#    postgresPassword: ""
# k8s affinity for all deployed pods (optional)
# affinity:

# k8s nodeSelector for all deployed pods (optional)
# nodeSelector:

# k8s tolerations for all deployed pods (optional)
# tolerations:

extraInitContainers: []

# set to true to disable auth (this is highly insecure)
disableAuth: false

#auth:
#  secretOverrides:
#    ledgerApiUser: ""

# should stakater reloader annotation be added (note: reloader needs to be installed separately)
enableReloader: true

