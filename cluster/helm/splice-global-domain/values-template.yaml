imageRepo: "ghcr.io/digital-asset/decentralized-canton-sync/docker"

enableHealthProbes: true

# Custom annotations and labels for deployed resources
pod:
  annotations: {}
  labels: {}

defaultJvmOptions: -XX:+UseG1GC -XX:+UseStringDeduplication -XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=75 -Dscala.concurrent.context.numThreads=12 -XX:ActiveProcessorCount=12 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/persistent-data/heap-dump-CURRENT_DATE.hprof
resources:
  limits:
    memory: 8Gi
  requests:
    cpu: "2"
    memory: 3Gi

sequencer:
  imageName: "canton-sequencer"
  cometbft:
    imageName: "canton-cometbft-sequencer"
  persistence:
    host: postgres.sv-1.svc.cluster.local
    secretName: "postgres-secrets"
    databaseName: cantonnet_sequencer
    port: 5432
    initImageName: "postgres:14"
#    secretOverrides:
#      postgresPassword: ""
  resources:
    limits:
      memory: 8Gi
    requests:
      cpu: "3"
      memory: 4Gi

mediator:
  imageName: "canton-mediator"
  persistence:
    host: postgres.sv-1.svc.cluster.local
    secretName: "postgres-secrets"
    databaseName: cantonnet_mediator
    port: 5432
    initImageName: "postgres:14"
#    secretOverrides:
#      postgresPassword: ""


metrics:
  enable: false
  release: prometheus-grafana-monitoring
  interval: 30s

# k8s affinity for all deployed pods (optional)
# affinity:

# k8s nodeSelector for all deployed pods (optional)
# nodeSelector:

# k8s tolerations for all deployed pods (optional)
# tolerations:

enableAntiAffinity: true

# should stakater reloader annotation be added (note: reloader needs to be installed separately)
enableReloader: true

