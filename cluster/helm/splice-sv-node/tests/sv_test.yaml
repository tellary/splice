suite: "SV values"
templates:
  - sv.yaml
release:
  # Set for testing labels
  name: mock-sv
chart:
  # Override for testing labels
  version: 0.1.1
  appVersion: 0.1.0

# Things we need just to pass the schema
set:
  domain:
    sequencerPublicUrl: "https://sequencer.mock.com"
    sequencerAddress: "sequencer-address"
    mediatorAddress: "mediator-address"
    sequencerPruningConfig:
      enabled: false
  scan:
    publicUrl: "https://scan.mock.com"
    internalUrl: "https://scan-internal.mock.com"
  nodeIdentifier: "helm-mock-1-validator"
  onboardingName: "some-sv"
  participantAddress: "mock-address"
  spliceInstanceNames:
    networkName: MockNet
    networkFaviconUrl: https://mock.net/favicon.ico
    amuletName: Mocklet
    amuletNameAcronym: MCK
    nameServiceName: Mock Name Service
    nameServiceNameAcronym: MNS
  auth:
    jwksUrl: "https://mock.com/.well-known/jwks.json"
    audience: "mock_audience"

tests:
  - it: "sets JWKS timeouts"
    set:
      auth:
        jwks:
          connectionTimeout: "33s"
          readTimeout: "44s"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='SPLICE_APP_VALIDATOR_AUTH_JWKS_CONNECTION_TIMEOUT')].value
          value: "33s"
      - equal:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='SPLICE_APP_VALIDATOR_AUTH_JWKS_READ_TIMEOUT')].value
          value: "44s"

  - it: "sets extra-beneficiaries"
    set:
      extraBeneficiaries:
        - beneficiary: "beneficiary1"
          weight: 10
        - beneficiary: "beneficiary2"
          weight: 25
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='ADDITIONAL_CONFIG_BENEFICIARIES_0')].value
          value: |
            canton.sv-apps.sv.extra-beneficiaries.0 = {
              beneficiary = "beneficiary1"
              weight = 10
            }
      - equal:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='ADDITIONAL_CONFIG_BENEFICIARIES_1')].value
          value: |
            canton.sv-apps.sv.extra-beneficiaries.1 = {
              beneficiary = "beneficiary2"
              weight = 25
            }

  - it: "accepts string values for extra-beneficiaries weight, to maintain backward compatibility till string values are disallowed"
    set:
      extraBeneficiaries:
        - beneficiary: "beneficiary1"
          weight: "10"
        - beneficiary: "beneficiary2"
          weight: "25"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='ADDITIONAL_CONFIG_BENEFICIARIES_0')].value
          value: |
            canton.sv-apps.sv.extra-beneficiaries.0 = {
              beneficiary = "beneficiary1"
              weight = 10
            }
      - equal:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='ADDITIONAL_CONFIG_BENEFICIARIES_1')].value
          value: |
            canton.sv-apps.sv.extra-beneficiaries.1 = {
              beneficiary = "beneficiary2"
              weight = 25
            }

  - it: "sets topology snapshot configuration"
    set:
      periodicTopologySnapshotConfig:
        location:
          bucket:
            projectId: "testProjectId"
            bucketName: "testBucketName"
          prefix: "testPrefix"
        backupInterval: "24h"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='ADDITIONAL_CONFIG_SPLICE_APP_SV_PERIODIC_TOPOLOGY_SNAPSHOT_CONFIG')].value
          value: |
            canton.sv-apps.sv.topology-snapshot-config = {
              location {
                type = gcp
                bucket {
                  project-id = "testProjectId"
                  bucket-name = "testBucketName"
                  credentials {
                    type = service-account
                    json-credentials = ${SPLICE_APP_VALIDATOR_BACKUP_BUCKET_SERVICE_ACCOUNT_CREDENTIALS}
                  }
                }
                prefix = "testPrefix"
              }
              backup-interval = "24h"
            }
  - it: "enables permissioned synchronizer flag"
    set:
      permissionedSynchronizer: true
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='ADDITIONAL_CONFIG_PERMISSIONED_SYNCHRONIZER')].value
          value: |
            canton.sv-apps.sv.permissioned-synchronizer = true
  - it: "sets synchronizer configuration (backwards compatible)"
    set:
      domain:
        sequencerPublicUrl: "https://sequencer.test.com"
        sequencerAddress: "sequencer-test-address"
        mediatorAddress: "mediator-test-address"
        enableBftSequencer: true
        sequencerPruningConfig:
          enabled: true
          pruningInterval: "1h"
          retentionPeriod: "7d"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='ADDITIONAL_CONFIG_SV_DOMAIN')].value
          value: |
            canton.sv-apps.sv.local-synchronizer-nodes.current {
              sequencer {
                is-bft-sequencer = true
                admin-api {
                  address = "sequencer-test-address"
                  port = 5009
                }
                internal-api {
                  address = "sequencer-test-address"
                  port = 5008
                }
                external-public-api-url = "https://sequencer.test.com"
                pruning {
                  pruning-interval = "1h"
                  retention-period = "7d"
                }
              }
              mediator {
                admin-api {
                  address = "mediator-test-address"
                  port = 5007
                }
              }
            }
  - it: "supports roll-forward-lsu configuration"
    set:
      domain:
        sequencerPublicUrl: "https://sequencer.test.com"
        sequencerAddress: "sequencer-test-address"
        mediatorAddress: "mediator-test-address"
        sequencerPruningConfig:
          enabled: true
          pruningInterval: "1h"
          retentionPeriod: "7d"
      rollForwardLsu:
        newPhysicalSynchronizerSerial: 23
        newPhysicalSynchronizerProtocolVersion: 42
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='ADDITIONAL_CONFIG_SV_ONBOARDING')].value
          value: |
            _onboarding {
              type = "roll-forward-lsu"
              new-physical-synchronizer-serial = 23
              new-physical-synchronizer-protocol-version = "42"
            }
  - it: "supports roll-forward-lsu configuration with export times"
    set:
      domain:
        sequencerPublicUrl: "https://sequencer.test.com"
        sequencerAddress: "sequencer-test-address"
        mediatorAddress: "mediator-test-address"
        sequencerPruningConfig:
          enabled: true
          pruningInterval: "1h"
          retentionPeriod: "7d"
      rollForwardLsu:
        newPhysicalSynchronizerSerial: 23
        newPhysicalSynchronizerProtocolVersion: 42
        exportTimes:
          topologyExportTime: "2026-04-30T00:00:00Z"
          trafficExportTime: "2026-04-30T00:01:00Z"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='ADDITIONAL_CONFIG_SV_ONBOARDING')].value
          value: |
            _onboarding {
              type = "roll-forward-lsu"
              new-physical-synchronizer-serial = 23
              new-physical-synchronizer-protocol-version = "42"
              export-times = {
                topology-export-time = {
                  type = "timestamp"
                  time = "2026-04-30T00:00:00Z"
                }
                traffic-export-time = {
                  type = "timestamp"
                  time = "2026-04-30T00:01:00Z"
                }
              }
            }
  - it: "supports roll-forward-lsu configuration with export times"
    set:
      domain:
        sequencerPublicUrl: "https://sequencer.test.com"
        sequencerAddress: "sequencer-test-address"
        mediatorAddress: "mediator-test-address"
        sequencerPruningConfig:
          enabled: true
          pruningInterval: "1h"
          retentionPeriod: "7d"
      rollForwardLsu:
        newPhysicalSynchronizerSerial: 23
        newPhysicalSynchronizerProtocolVersion: 42
        exportTimes:
          topologyExportTime: "2026-04-30T00:00:00Z"
          trafficExportTime: "2026-04-30T00:01:00Z"
          upgradeTime: "2026-04-30T00:02:00Z"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='ADDITIONAL_CONFIG_SV_ONBOARDING')].value
          value: |
            _onboarding {
              type = "roll-forward-lsu"
              new-physical-synchronizer-serial = 23
              new-physical-synchronizer-protocol-version = "42"
              export-times = {
                topology-export-time = {
                  type = "timestamp"
                  time = "2026-04-30T00:00:00Z"
                }
                traffic-export-time = {
                  type = "timestamp"
                  time = "2026-04-30T00:01:00Z"
                }
                upgrade-time = {
                  type = "timestamp"
                  time = "2026-04-30T00:02:00Z"
                }
              }
            }

  - it: "allows overriding sv-app image and initImage"
    set:
      imageRepo: "secure-registry.example.com"
      imageName: "custom-sv-app"
      persistence.initImageName: "secure-registry.example.com/postgres:14-custom"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='sv-app')].image
          pattern: "^secure-registry\\.example\\.com/custom-sv-app:"
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "secure-registry.example.com/postgres:14-custom"

  - it: "allows overriding all 8 SV secret env vars with raw strings"
    set:
      joinWithKeyOnboarding.sponsorApiUrl: "https://sponsor.mock.com"
      cometBFT.externalGovernanceKey: true
      identitiesExport.prefix: "mock-prefix"
      identitiesExport.bucket.bucketName: "mock-bucket"
      identitiesExport.bucket.jsonCredentials: "mock-creds"
      identitiesExport.bucket.projectId: "mock-project"
      identitiesExport.bucket.secretName: "mock-secret"
      periodicTopologySnapshotConfig.backupInterval: "24h"
      periodicTopologySnapshotConfig.location.prefix: "mock-prefix"
      periodicTopologySnapshotConfig.location.bucket.projectId: "mock-project"
      periodicTopologySnapshotConfig.location.bucket.bucketName: "mock-bucket"
      periodicTopologySnapshotConfig.location.bucket.secretName: "mock-secret"
      secretOverrides.svPublicKey: "vault:kv/data/sv/pub"
      secretOverrides.svPrivateKey: "vault:kv/data/sv/priv"
      persistence.secretOverrides.postgresPassword: "vault:kv/data/sv/pg"
      cometBFT.secretOverrides.governancePublicKey: "vault:kv/data/sv/comet-pub"
      cometBFT.secretOverrides.governancePrivateKey: "vault:kv/data/sv/comet-priv"
      identitiesExport.bucket.secretOverrides.jsonCredentials: "vault:kv/data/sv/ids-export"
      periodicTopologySnapshotConfig.location.bucket.secretOverrides.jsonCredentials: "vault:kv/data/sv/topology"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='SPLICE_APP_SV_PUBLIC_KEY')].value
          pattern: "vault:kv/data/sv/pub"
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='SPLICE_APP_SV_PRIVATE_KEY')].value
          pattern: "vault:kv/data/sv/priv"
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='SPLICE_APP_POSTGRES_PASSWORD')].value
          pattern: "vault:kv/data/sv/pg"
      - matchRegex:
          path: spec.template.spec.initContainers[?(@.name=='mock-sv-init')].env[?(@.name=='PGPASSWORD')].value
          pattern: "vault:kv/data/sv/pg"
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='SPLICE_APP_SV_COMETBFT_GOVERNANCE_PUBLIC_KEY')].value
          pattern: "vault:kv/data/sv/comet-pub"
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='SPLICE_APP_SV_COMETBFT_GOVERNANCE_PRIVATE_KEY')].value
          pattern: "vault:kv/data/sv/comet-priv"
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='SPLICE_APP_SV_IDS_BACKUP_BUCKET_SERVICE_ACCOUNT_CREDENTIALS')].value
          pattern: "vault:kv/data/sv/ids-export"
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='sv-app')].env[?(@.name=='SPLICE_APP_VALIDATOR_BACKUP_BUCKET_SERVICE_ACCOUNT_CREDENTIALS')].value
          pattern: "vault:kv/data/sv/topology"
