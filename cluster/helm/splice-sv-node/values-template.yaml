imageRepo: "ghcr.io/digital-asset/decentralized-canton-sync/docker"
imageName: "sv-app"
ui:
  imageName: "sv-web-ui"
  # Optional: Provide raw strings to override the default Kubernetes secret injection.
  # This is useful for integrating with external secret management tools.
  # Note: Ensure you have the appropriate mutating webhook/injector installed in your cluster.
  #  secretOverrides:
  #    clientId: ""
  #    url: ""

#secretOverrides:
#  svPublicKey: ""
#  svPrivateKey: ""



# Custom annotations and labels for deployed resources
pod:
  annotations: {}
  labels: {}

cluster:
  fixedTokens: false

# TODO(DACH-NY/canton-network-internal#2125) Revisit idle timeout on 3.4
defaultJvmOptions: -XX:+UseG1GC -XX:+UseStringDeduplication -XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=75 -Dscala.concurrent.context.numThreads=12 -XX:ActiveProcessorCount=12 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/persistent-data/heap-dump-CURRENT_DATE.hprof -Dpekko.http.server.idle-timeout=20m -Dpekko.http.client.idle-timeout=20m
resources:
  limits:
    memory: 8Gi
  requests:
    cpu: 2
    memory: 6Gi

metrics:
  enable: false
  release: prometheus-grafana-monitoring
  interval: 30s

persistence:
  databaseName: cantonnet_sv
  schema: sv
  host: postgres
  port: 5432
  user: cnadmin
  secretName: "postgres-secrets"
  initImageName: "postgres:14"
#  secretOverrides:
#    postgresPassword: ""

migration:
  attachPvc: true
# pvc used for migrations
pvc:
  volumeName: sv-app-global-domain-migration-pvc
  volumeStorageClass: standard-rwo

failOnAppVersionMismatch: true
permissionedSynchronizer: false

spliceInstanceNames:
  networkName: # Please provide a value as provided in the docs
  networkFaviconUrl: # Please provide a value as provided in the docs
  amuletName: # Please provide a value as provided in the docs
  amuletNameAcronym: # Please provide a value as provided in the docs
  nameServiceName: # Please provide a value as provided in the docs
  nameServiceNameAcronym: # Please provide a value as provided in the docs

# k8s affinity for all deployed pods (optional)
# affinity:

# k8s nodeSelector for all deployed pods (optional)
# nodeSelector:

# k8s tolerations for all deployed pods (optional)
# tolerations:

# set the poll interval used by the UI in milliseconds (optional)
# uiPollInterval:

service:
  ui:
    port: 80
logLevel: DEBUG

# should stakater reloader annotation be added (note: reloader needs to be installed separately)
enableReloader: true

#auth:
#  secretOverrides:
#    ledgerApiUser: ""
#    audience: ""
#    token: ""
#    url: ""
#    clientId: ""
#    clientSecret: ""
#    scope: ""

