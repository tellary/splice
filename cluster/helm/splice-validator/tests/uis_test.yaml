suite: "Validator UIs"
templates:
  - wallet-web-ui.yaml

set:
  # Things we need just to pass the schema
  nodeIdentifier: "helm-mock-1-validator"
  validatorPartyHint: "helm-mock-1"
  validatorWalletUser: "mock-wallet-user-id"
  spliceInstanceNames:
    networkName: MockNet
    networkFaviconUrl: https://mock.net/favicon.ico
    amuletName: Mocklet
    amuletNameAcronym: MCK
    nameServiceName: Mock Name Service
    nameServiceNameAcronym: MNS
  topup:
    enabled: false
  auth:
    jwksUrl: "https://mock.com/.well-known/jwks.json"
    audience: "mock_audience"

tests:

  - it: "defaults to auth"
    # tests the defaults (not setting any further values)
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - notExists:
          path: spec.template.spec.containers[?(@.name=="wallet-web-ui")].env[?(@.name=="SPLICE_APP_UI_UNSAFE")].value

  - it: "supports disabling auth"
    set:
      # actual test
      disableAuth: true
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=="wallet-web-ui")].env[?(@.name=="SPLICE_APP_UI_UNSAFE")].value
          value: "true"

  - it: "allows overriding walletImageName"
    set:
      imageRepo: "secure-registry.com"
      wallet.imageName: "custom-wallet-ui"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=="wallet-web-ui")].image
          pattern: "^secure-registry\\.com/custom-wallet-ui:"

  - it: "allows overriding wallet-web-ui secret env vars with raw strings"
    set:
      validatorWebUi.secretOverrides.clientId: "vault:kv/data/wallet-ui/client-id"
      validatorWebUi.secretOverrides.url: "vault:kv/data/wallet-ui/url"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=="wallet-web-ui")].env[?(@.name=="SPLICE_APP_UI_AUTH_CLIENT_ID")].value
          pattern: "vault:kv/data/wallet-ui/client-id"
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=="wallet-web-ui")].env[?(@.name=="SPLICE_APP_UI_AUTH_URL")].value
          pattern: "vault:kv/data/wallet-ui/url"

  - it: "injects custom serviceAccountName into Deployment when specified"
    set:
      serviceAccountName: "custom-wallet-ui-sa"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: "custom-wallet-ui-sa"
