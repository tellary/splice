sdk-version: 3.4.11
name: splice-test-token-v1-test
source: daml
version: 1.0.0
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
data-dependencies:
  - ../../splice-api-token-metadata-v1/.daml/dist/splice-api-token-metadata-v1-current.dar
  - ../../splice-api-token-holding-v1/.daml/dist/splice-api-token-holding-v1-current.dar
  - ../../splice-api-token-transfer-instruction-v1/.daml/dist/splice-api-token-transfer-instruction-v1-current.dar
  - ../../splice-api-token-allocation-v1/.daml/dist/splice-api-token-allocation-v1-current.dar
  - ../../splice-api-token-allocation-instruction-v1/.daml/dist/splice-api-token-allocation-instruction-v1-current.dar
  - ../../splice-api-token-holding-v2/.daml/dist/splice-api-token-holding-v2-current.dar
  - ../../splice-token-standard-utils/.daml/dist/splice-token-standard-utils-current.dar

  - ../splice-test-token-v1/.daml/dist/splice-test-token-v1-current.dar
  - ../../../daml/splice-util-token-standard-wallet/.daml/dist/splice-util-token-standard-wallet-current.dar

  - ../../splice-token-standard-utils/.daml/dist/splice-token-standard-utils-current.dar
  - ../../splice-token-standard-v1-test/.daml/dist/splice-token-standard-v1-test-current.dar
  - ../../splice-token-standard-v2-test/.daml/dist/splice-token-standard-v2-test-current.dar

build-options:
  - --target=2.1
  - --ghc-option=-Wunused-binds
  - --ghc-option=-Wunused-matches
codegen:
  java:
    package-prefix: org.lfdecentralizedtrust.splice.codegen.java
    decoderClass: org.lfdecentralizedtrust.splice.codegen.java.DecoderSpliceTestTokenV1
    output-directory: target/daml-codegen-java
